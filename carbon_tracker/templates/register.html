{% extends 'base.html' %}
{% block title %}Register — EcoTrack{% endblock %}
{% block content %}
<div class="row justify-content-center">
  <div class="col-md-5">
    <div class="auth-card text-center">
      <div style="font-size:3rem;margin-bottom:0.5rem">🌱</div>
      <h2 style="font-family:'DM Serif Display',serif;color:var(--green-dark)">Join EcoTrack</h2>
      <p class="text-muted mb-4">Start your sustainability journey today</p>
      <form method="POST" class="text-start">
        <div class="mb-3">
          <label class="form-label">Full Name</label>
          <input type="text" name="name" class="form-control" required placeholder="Your name"/>
        </div>
        <div class="mb-3">
          <label class="form-label">Email</label>
          <input type="email" name="email" class="form-control" required placeholder="you@example.com"/>
        </div>
        <div class="mb-3">
          <label class="form-label">City</label>
          <input type="text" name="city" class="form-control" required placeholder="e.g. Nashik, Pune, Nagpur"/>
        </div>
        <div class="mb-4">
          <label class="form-label">Password</label>
          <input type="password" name="password" class="form-control" required placeholder="Min 6 characters"/>
        </div>
        <button type="submit" class="btn btn-eco-primary w-100 btn-lg">🌍 Create My Account</button>
      </form>
      <p class="text-center mt-3 text-muted" style="font-size:0.88rem">Already registered? <a href="{{ url_for('login') }}" style="color:var(--green-main);font-weight:700">Login</a></p>
    </div>
  </div>
</div>
{% endblock %}
