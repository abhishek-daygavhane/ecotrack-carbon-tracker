{% extends 'base.html' %}
{% block title %}Register — EcoTrack{% endblock %}
{% block content %}
<div class="row justify-content-center">
  <div class="col-md-5">
    <div class="auth-card">
      <div class="text-center mb-4">
        <div class="fs-1">🌱</div>
        <h3 class="fw-bold">Join EcoTrack</h3>
        <p class="text-muted">Start your sustainability journey</p>
      </div>
      <form method="POST">
        <div class="mb-3">
          <label class="form-label">Full Name</label>
          <input type="text" name="name" class="form-control" required placeholder="Your name"/>
        </div>
        <div class="mb-3">
          <label class="form-label">Email</label>
          <input type="email" name="email" class="form-control" required placeholder="you@example.com"/>
        </div>
        <div class="mb-3">
          <label class="form-label">City</label>
          <input type="text" name="city" class="form-control" required placeholder="e.g. Nashik, Pune, Mumbai"/>
        </div>
        <div class="mb-4">
          <label class="form-label">Password</label>
          <input type="password" name="password" class="form-control" required placeholder="Min 6 characters"/>
        </div>
        <button type="submit" class="btn btn-eco-primary w-100 btn-lg">🌍 Create Account</button>
      </form>
      <p class="text-center mt-3 text-muted">Already registered? <a href="{{ url_for('login') }}">Login</a></p>
    </div>
  </div>
</div>
{% endblock %}
