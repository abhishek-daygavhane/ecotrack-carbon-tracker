{% extends 'base.html' %}
{% block title %}Login — EcoTrack{% endblock %}
{% block content %}
<div class="row justify-content-center">
  <div class="col-md-5">
    <div class="auth-card">
      <div class="text-center mb-4">
        <div class="fs-1">🌍</div>
        <h3 class="fw-bold">Welcome back</h3>
        <p class="text-muted">Login to continue tracking</p>
      </div>
      <form method="POST">
        <div class="mb-3">
          <label class="form-label">Email</label>
          <input type="email" name="email" class="form-control" required placeholder="you@example.com"/>
        </div>
        <div class="mb-4">
          <label class="form-label">Password</label>
          <input type="password" name="password" class="form-control" required placeholder="••••••••"/>
        </div>
        <button type="submit" class="btn btn-eco-primary w-100 btn-lg">Login</button>
      </form>
      <p class="text-center mt-3 text-muted">Don't have an account? <a href="{{ url_for('register') }}">Register free</a></p>
    </div>
  </div>
</div>
{% endblock %}
